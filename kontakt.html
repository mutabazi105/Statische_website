<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontaktformular</title>
</head>
<body>

    <h1>Kontakt</h1>

    <form action="/kontakt" method="post">

        <fieldset>
            <legend>Kontaktdaten</legend>

            <label for="name">Name *</label>
            <input type="text" id="name" name="name" required minlength="2">

            <label for="email">E-Mail *</label>
            <input type="email" id="email" name="email" required>

            <label for="telefon">Telefon</label>
            <input type="tel" id="telefon" name="telefon">
        </fieldset>

        <fieldset>
            <legend>Nachricht</legend>

            <label for="betreff">Betreff *</label>
            <select id="betreff" name="betreff" required>
                <option value="" disabled selected>— bitte wählen —</option>
                <option value="frage">Allgemeine Frage</option>
                <option value="angebot">Angebotsanfrage</option>
                <option value="feedback">Feedback</option>
            </select>

            <label for="nachricht">Nachricht *</label>
            <textarea id="nachricht" name="nachricht" rows="6" required></textarea>
        </fieldset>

        <button type="submit">Nachricht absenden</button>

    </form>

</body>
</html>
